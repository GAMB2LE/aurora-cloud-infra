---
# The JASMIN VM has been shut down for the July 2026 outage window. The
# droplet is the active processor while still serving its split public hostname.
aurora_failover_role: primary
aurora_domain: data-ocean.gamb2le.co.uk
aurora_public_ip: 167.172.54.82
aurora_app_repo: https://github.com/GAMB2LE/aurora_cloud_dashboard.git
aurora_dashboard_extra_files:
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/app.py"
    dest: app.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/collect_operations_snapshot.py"
    dest: collect_operations_snapshot.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/grouped_timeseries.py"
    dest: grouped_timeseries.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/generate_power_display_summary.py"
    dest: generate_power_display_summary.py
    mode: "0755"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/append_new_pdu_to_zarr.py"
    dest: append_new_pdu_to_zarr.py
    mode: "0755"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/rebuild_cutoff.py"
    dest: rebuild_cutoff.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/model-evaluation.py"
    dest: model-evaluation.py
    owner: root
    group: root
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/dart.py"
    dest: dart.py
    owner: root
    group: root
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/wxcam_catalog.py"
    dest: wxcam_catalog.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/radar_colormaps.py"
    dest: radar_colormaps.py
    mode: "0644"

# The droplet has its own public hostname. Full public failover can still be
# done later by overriding aurora_domain=data.gamb2le.co.uk after DNS moves.
aurora_certbot_enabled: true
aurora_nginx_disabled_sites:
  - data.gamb2le.co.uk

aurora_standby_replication_timer_enabled: false
aurora_standby_replication_ssh_private_key_source: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa_jasmin_20200514"
aurora_standby_primary_host: 130.246.212.116
aurora_standby_primary_user: azimuth
aurora_standby_primary_proxy_jump: rrniii@login.jasmin.ac.uk
aurora_standby_replication_known_hosts:
  - login.jasmin.ac.uk
  - "{{ aurora_standby_primary_host }}"

# CL61 is now written to the shared ASS Linux data path and is reachable from
# the droplet via Tailscale SSH as the aurora user.

# Planned-offline/no-data states during the JASMIN outage should not leave
# failed oneshot units behind. Keep core append/sync/health timers running.
aurora_processing_timers:
  les_operational_run: false
  wxcam_daily_videos: "{{ aurora_writer_timers_enabled }}"
