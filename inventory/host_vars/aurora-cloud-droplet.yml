---
# Public development/staging host. It stays live by pulling production data
# from JASMIN and does not run authoritative source/product writers.
aurora_site_env: development
aurora_failover_role: standby
aurora_domain: data-ocean.gamb2le.co.uk
aurora_public_ip: 167.172.54.82
aurora_app_repo: https://github.com/GAMB2LE/aurora_cloud_dashboard.git
# Exact dashboard commit from the isolated development performance branch.
# Do not promote this ref or use it for the JASMIN production inventory.
aurora_app_version: b8b718d56837ce4fbcfa4e36baf45c0409527e11
# Development-only performance experiment. Panel supports reconnecting after a
# brief disconnect, while this prevents unused phone sessions retaining a full
# dashboard document for the production one-hour lifetime.
aurora_dashboard_session_check_ms: 15000
aurora_dashboard_unused_session_lifetime_ms: 60000

# These compact display products are generated on development. Keep them
# outside the mirrored production product tree so the five-minute mirror cannot
# remove a valid development build that production has not published yet.
aurora_power_display_summary_path: "{{ aurora_dev_product_root }}/power/power_display_summary.zarr"
aurora_power_display_energy_path: "{{ aurora_dev_product_root }}/power/power_display_energy.zarr"
aurora_power_current_display_path: "{{ aurora_dev_product_root }}/power/power_current_display.zarr"
aurora_power_forecast_display_path: "{{ aurora_dev_product_root }}/power/power_forecast_display.zarr"
aurora_power_display_manifest_path: "{{ aurora_dev_product_root }}/power/power_display_manifest.json"

# The droplet has its own public development hostname. Full public failover is
# manual and should not be done by changing this development baseline silently.
aurora_certbot_enabled: true
aurora_nginx_disabled_sites:
  - data.gamb2le.co.uk

aurora_standby_replication_timer_enabled: true
aurora_standby_replication_ssh_private_key_source: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa_jasmin_20200514"
aurora_standby_primary_host: 130.246.212.116
aurora_standby_primary_user: azimuth
aurora_standby_primary_proxy_jump: rrniii@login.jasmin.ac.uk
aurora_standby_replication_known_hosts:
  - login.jasmin.ac.uk
  - "{{ aurora_standby_primary_host }}"

# CL61 is now written to the shared ASS Linux data path and is reachable from
# the droplet via Tailscale SSH as the aurora user.

# Planned-offline/no-data states during the JASMIN outage should not leave
# failed oneshot units behind. Keep core append/sync/health timers running.
aurora_processing_timers:
  les_operational_run: false
  wxcam_daily_videos: "{{ aurora_writer_timers_enabled }}"
