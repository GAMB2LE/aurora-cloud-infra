  power_soc_forecast: "{{ aurora_product_root }}/power/power_soc_forecast.zarr"
  power_soc_forecast_archive: "{{ aurora_product_root }}/power/power_soc_forecast_archive.zarr"
  power_soc_forecast_skill: "{{ aurora_product_root }}/power/power_soc_forecast_skill.zarr"
  power_soc_hindcast: "{{ aurora_product_root }}/power/power_soc_hindcast.zarr"
  power_soc_ensemble: "{{ aurora_product_root }}/power/power_soc_ensemble_forecast.zarr"
  power_soc_ensemble_archive: "{{ aurora_product_root }}/power/power_soc_ensemble_archive.zarr"
  power_soc_ensemble_skill: "{{ aurora_product_root }}/power/power_soc_ensemble_skill.zarr"
  ops_monitor: "{{ aurora_product_root }}/ops_monitor/ops_monitor.zarr"
  wxcam: "{{ wxcam_zarr_mount_path }}"
  auroracam: "{{ aurora_product_root }}/auroracam/auroracam.zarr"

aurora_catalogs:
