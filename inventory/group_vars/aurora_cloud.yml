tailscale_enabled: true
# Do not commit the auth key. Export TAILSCALE_AUTHKEY before running site.yml,
# or override this variable from an Ansible Vault file.
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') | default('', true) }}"

# Optional ASS/APS edge reverse-tunnel server on data-ocean. Disabled by
# default; enabling this creates only the restricted SSH tunnel account unless
# edge_tunnel_server_manage_sshd_config is also set.
edge_tunnel_server_enabled: false
edge_tunnel_server_user: aurora-tunnel
edge_tunnel_server_group: aurora-tunnel
edge_tunnel_server_home: /var/lib/aurora-tunnel
edge_tunnel_server_shell: /usr/sbin/nologin
edge_tunnel_server_authorized_keys: []
edge_tunnel_server_default_key_options:
  - restrict
  - port-forwarding
  - no-agent-forwarding
  - no-X11-forwarding
  - no-pty
  - permitlisten="127.0.0.1:2201"
  - permitlisten="127.0.0.1:2202"
edge_tunnel_server_manage_sshd_config: false
edge_tunnel_server_listen_ports:
  - 127.0.0.1:2201
  - 127.0.0.1:2202

# Prefer rsync via JASMIN transfer servers for reliable GWS sync.
gws_sync_enabled: true
gws_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
gws_transfer_hosts:
  - xfer-vm-03.jasmin.ac.uk
  - xfer-vm-01.jasmin.ac.uk
  - xfer-vm-02.jasmin.ac.uk
gws_username: rrniii
gws_path: /gws/ssde/j25b/gamb2le
gws_group: gws_gamb2le
gws_raw_root: "{{ gws_path }}/data/incoming/aurora-cloud/raw"
gws_products_root: "{{ gws_path }}/data/output/aurora-cloud/products"
gws_internal_root: "{{ gws_path }}/data/internal/aurora-cloud"
# Automated timers need a real private key on the VM. Agent forwarding from the
# admin SSH session is not sufficient for unattended systemd jobs.
gws_generate_ssh_key: false
gws_ssh_private_key: /home/aurora/.ssh/id_rsa_jasmin_20200514
gws_manifest_root: /data/aurora/internal/mirror_manifests
gws_manifest_history_keep: 48
gws_manifest_checksum_mode: none
gws_manifest_spot_modulus: 20
gws_verification_enabled: true
gws_verification_timer_enabled: "{{ aurora_writer_timers_enabled }}"
gws_sync_randomized_delay_sec: 60
gws_sync_timeout_start_sec: 6h
gws_verification_randomized_delay_sec: 60
gws_verification_schedule: "*:08/10"
gws_sync_jobs:
  - name: raw
    source: "{{ aurora_raw_root }}/"
    destination: "{{ gws_raw_root }}/"
    schedule: "*:01/5"
  - name: products
    source: "{{ aurora_product_root }}/"
    destination: "{{ gws_products_root }}/"
    schedule: "*:03/10"
    exclude:
      - /wxcam/**
  - name: products-wxcam
    source: "{{ aurora_paths.products_wxcam }}/"
    destination: "{{ gws_products_root }}/wxcam/"
    schedule: "*:07/30"
    timeout_start_sec: 12h
    exclude:
      - /wxcam.zarr
      - /wxcam.zarr/**
  - name: manifests
    source: "{{ gws_manifest_root }}/"
    destination: "{{ gws_internal_root }}/manifests/"
    schedule: "*:06/10"

# SSHFS mount is required for the GWS-only WXcam pixel Zarr. Bulk raw and
# non-WXcam product mirroring still use the rsync jobs above.
gws_sshfs_enabled: true
gws_sshfs_mountpoint: /mnt/gws/gamb2le

# Development live mirror. The data-ocean host pulls from production/JASMIN
# while writer timers stay disabled. Manual failover is still a separate,
# explicit promotion event.
aurora_standby_replication_enabled: "{{ aurora_is_development }}"
aurora_standby_replication_timer_enabled: "{{ aurora_standby_replication_enabled }}"
aurora_standby_primary_host: 130.246.212.116
aurora_standby_primary_user: azimuth
aurora_standby_primary_proxy_jump: ""
aurora_standby_primary_ssh_extra_args: []
aurora_standby_replication_known_hosts:
  - "{{ aurora_standby_primary_host }}"
aurora_standby_replication_ssh_private_key: /home/aurora/.ssh/id_rsa_jasmin_20200514
aurora_standby_replication_ssh_private_key_source: ""
aurora_standby_replication_ssh_private_key_content: ""
aurora_standby_replication_rsync_path: sudo rsync
aurora_standby_replication_interval: 5min
aurora_standby_replication_randomized_delay_sec: 60
aurora_standby_replication_timeout_start_sec: 12h
aurora_standby_replication_delete: true
aurora_standby_replication_state_root: "{{ aurora_state_root }}/dev-live-mirror"
aurora_standby_replication_paths:
  - name: raw
    source: "{{ aurora_raw_root }}/"
    destination: "{{ aurora_raw_root }}/"
    exclude:
      - "*.lock"
      - "*.tmp"
  - name: products
    source: "{{ aurora_product_root }}/"
    destination: "{{ aurora_product_root }}/"
    exclude:
      - ".zarr-rebuild-backups/**"
      - "*.lock"
      - "*.tmp"
  - name: internal
    source: "{{ aurora_data_root }}/internal/"
    destination: "{{ aurora_data_root }}/internal/"
    exclude:
      - dev-live-mirror/**
      - "*.lock"
      - "*.tmp"
  - name: state
    source: "{{ aurora_state_root }}/"
    destination: "{{ aurora_state_root }}/"
    exclude:
      - standby-replication/**
      - dev-live-mirror/**
      - "*.lock"
      - "*.tmp"
