auroracam_source_destination: "{{ aurora_paths.raw_auroracam }}"
# The priority lane has an independent checkpoint so an archive recovery can
# never delay the latest station frames.
auroracam_source_state_file: "{{ aurora_state_root }}/auroracam-live-sync.last"
auroracam_source_sync_interval: 2min
auroracam_source_sync_randomized_delay: 30
auroracam_source_bootstrap_lookback_seconds: 1800
auroracam_source_overlap_seconds: 600
auroracam_source_mtime_grace_seconds: 300
auroracam_backfill_enabled: true
auroracam_backfill_timer_enabled: "{{ aurora_writer_timers_enabled }}"
