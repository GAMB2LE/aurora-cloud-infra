auroracam_source_sync_randomized_delay: 30
auroracam_index_interval: 2min
auroracam_index_randomized_delay: 30

aurora_enable_ufw: true
aurora_preserve_existing_listener_ports: []
aurora_remove_public_listener_ports:
  # Previously preserved on the JASMIN-era host. The active droplet has no
  # current listeners on these ports, so remove public allows if present.
  - { port: "5901", proto: tcp, comment: "existing VNC" }
  - { port: "9100", proto: tcp, comment: "existing node_exporter" }
  - { port: "111", proto: tcp, comment: "existing rpcbind" }
  - { port: "111", proto: udp, comment: "existing rpcbind" }

