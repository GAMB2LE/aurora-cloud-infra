# PANO camera streams. AUTO/LONG/SHORT files remain on the camera host.
wxcam_source_fish_pattern: "HDR_*.jpg"
wxcam_source_pano_pattern: "HDR_*_PANO.jpg"
wxcam_source_destination: "{{ aurora_paths.raw_wxcam }}"
wxcam_source_state_file: "{{ aurora_state_root }}/wxcam-sync.last"
wxcam_source_sync_interval: 2min
wxcam_source_sync_randomized_delay: 30
wxcam_full_raw_mirror: false
# False means the first timer run can pull the retained WXcam HDR archive locally.
wxcam_source_start_fresh: false

wxcam_zarr_state_file: "{{ aurora_state_root }}/wxcam-zarr-state-20260704.json"

auroracam_source_sync_enabled: true
auroracam_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
