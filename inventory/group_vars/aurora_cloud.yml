aurora_quicklook_dirs:
  ceilometer: "{{ aurora_paths.quicklooks }}/ceilometer"
  cloud_radar: "{{ aurora_paths.quicklooks }}/cloud_radar"
  hatpro: "{{ aurora_paths.quicklooks }}/hatpro"
  vaisalamet: "{{ aurora_paths.quicklooks }}/vaisalamet"
  asfs_logger: "{{ aurora_paths.quicklooks }}/asfs_logger"
  asfs_fast_sonic: "{{ aurora_paths.quicklooks }}/asfs_fast_sonic"
  power: "{{ aurora_paths.quicklooks }}/power"
  ops_monitor: "{{ aurora_paths.quicklooks }}/ops_monitor"

aurora_quicklook_latest:
  ceilometer: "{{ aurora_quicklook_dirs.ceilometer }}/latest.png"
  cloud_radar: "{{ aurora_quicklook_dirs.cloud_radar }}/latest.png"
  hatpro: "{{ aurora_quicklook_dirs.hatpro }}/latest.png"
  vaisalamet: "{{ aurora_quicklook_dirs.vaisalamet }}/latest.png"
  asfs_logger: "{{ aurora_quicklook_dirs.asfs_logger }}/latest.png"
  asfs_fast_sonic: "{{ aurora_quicklook_dirs.asfs_fast_sonic }}/latest.png"
  power: "{{ aurora_quicklook_dirs.power }}/latest.png"
  ops_monitor: "{{ aurora_quicklook_dirs.ops_monitor }}/latest.png"

aurora_dashboard_allowed_origins:
  - "{{ aurora_domain }}"
  - "{{ aurora_domain }}:443"
  - "{{ aurora_public_ip }}"
  - "{{ aurora_public_ip }}:80"
  - "{{ aurora_public_ip }}:443"

# Backward-compatible global default for any timer not listed below.
aurora_enable_processing_timers: "{{ aurora_writer_timers_enabled }}"
aurora_processing_timers:
  # CL61 is the first fresh pipeline to enable. The append script now
  # bootstraps the Zarr from recent raw files when the store is absent.
  ceilometer_append: "{{ aurora_writer_timers_enabled }}"
  ceilometer_last24h: "{{ aurora_writer_timers_enabled }}"
  ceilometer_quicklooks: "{{ aurora_writer_timers_enabled }}"
  radar_append: "{{ aurora_writer_timers_enabled }}"
  radar_quicklooks: "{{ aurora_writer_timers_enabled }}"
  hatpro_append: "{{ aurora_writer_timers_enabled }}"
  hatpro_quicklooks: "{{ aurora_writer_timers_enabled }}"
  vaisalamet_append: "{{ aurora_writer_timers_enabled }}"
  vaisalamet_quicklooks: "{{ aurora_writer_timers_enabled }}"
  asfs_logger_append: "{{ aurora_writer_timers_enabled }}"
  asfs_logger_quicklooks: "{{ aurora_writer_timers_enabled }}"
  asfs_fast_sonic_append: "{{ aurora_writer_timers_enabled }}"
  asfs_fast_sonic_quicklooks: "{{ aurora_writer_timers_enabled }}"
  asfs_fast_gas_append: "{{ aurora_writer_timers_enabled }}"
  power_append: "{{ aurora_writer_timers_enabled }}"
  pdu_append: "{{ aurora_writer_timers_enabled }}"
  power_soc_forecast: "{{ aurora_writer_timers_enabled }}"
  power_soc_ensemble: "{{ aurora_writer_timers_enabled }}"
  power_quicklooks: "{{ aurora_writer_timers_enabled }}"
  ops_monitor_collect: "{{ aurora_writer_timers_enabled }}"
  ops_monitor_append: "{{ aurora_writer_timers_enabled }}"
  ops_monitor_alerts: "{{ aurora_writer_timers_enabled }}"
  ops_monitor_quicklooks: "{{ aurora_writer_timers_enabled }}"
  les_operational_run: "{{ aurora_writer_timers_enabled }}"
  wxcam_catalog: "{{ aurora_writer_timers_enabled }}"
  wxcam_append: "{{ aurora_writer_timers_enabled }}"
  wxcam_daily_videos: "{{ aurora_writer_timers_enabled }}"
  auroracam_index: "{{ aurora_writer_timers_enabled }}"

ops_alert_recipients:
  - gamb2le@ncas.ac.uk
ops_alert_transport: auto
ops_alert_from: "aurora-ops@{{ ansible_hostname | default('aurora-cloud') }}"
ops_alert_smtp_host: ""
ops_alert_smtp_port: ""
ops_alert_smtp_user: ""
ops_alert_smtp_password: ""
ops_alert_smtp_starttls: true
ops_alert_smtp_ssl: false

cl61_source_sync_enabled: true
cl61_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
cl61_source_auth: "{{ edge_source_sync_auth }}"
cl61_source_generate_ssh_key: false
cl61_source_user: aurora
cl61_source_host: "{{ edge_source_sync_ass_host }}"
cl61_source_port: "{{ edge_source_sync_ass_port }}"
cl61_source_path: /home/aurora/data/cl61
cl61_source_pattern: "gamb2le_depolarisation_lidar_ceilometer_aurora_*.nc"
cl61_source_destination: "{{ aurora_paths.raw_cl61 }}"
# Retained for the retired celine-edge-1 key-auth mode; unused when
# cl61_source_auth is tailscale.
cl61_source_ssh_key_path: "{{ edge_source_sync_ssh_key_path if (edge_source_sync_use_reverse_tunnels | bool) else '/home/aurora/.ssh/id_ed25519_celine' }}"
cl61_source_state_file: "{{ aurora_state_root }}/cl61-sync.last"
cl61_source_sync_interval: 2min
cl61_source_sync_randomized_delay: 30
# True means the first timer run records "now" and does not pull historical data.
cl61_source_start_fresh: false

radar_source_sync_enabled: true
radar_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
radar_source_auth: "{{ edge_source_sync_auth }}"
radar_source_user: aurora
radar_source_host: "{{ edge_source_sync_ass_host }}"
radar_source_port: "{{ edge_source_sync_ass_port }}"
radar_source_ssh_key_path: "{{ edge_source_sync_ssh_key_path }}"
radar_source_path: /home/aurora/data/rpgfmcw94
# Preserve the complete native RPG tree in cloud raw storage and on GWS.
# Processing remains restricted to LV1 NetCDF through radar_product_pattern.
radar_source_pattern: "*"
radar_product_pattern: "*LV1.NC"
radar_source_scope_version: all-native-files-v1
radar_source_destination: "{{ aurora_paths.raw_radar }}"
# Deliberately independent of the retired all-history checkpoint.  Reusing the
# old marker would make the priority lane requeue the whole LV0 archive.
radar_source_state_file: "{{ aurora_state_root }}/radar-live-sync.last"
radar_source_sync_interval: 2min
radar_source_sync_randomized_delay: 30
radar_source_bootstrap_lookback_seconds: 1800
radar_source_overlap_seconds: 600
radar_source_mtime_grace_seconds: 300
radar_backfill_enabled: true
radar_backfill_timer_enabled: "{{ aurora_writer_timers_enabled }}"
radar_backfill_interval: 2min
radar_backfill_randomized_delay: 15
radar_backfill_workers: 4
radar_backfill_batch_files: 24
radar_backfill_batch_bytes: 85899345920
radar_backfill_partial_root: "{{ aurora_paths.raw_radar }}/.radar-partials"
radar_backfill_status_file: "{{ aurora_state_root }}/radar-backfill-status.json"
# True means the first timer run records "now" and does not pull historical data.
radar_source_start_fresh: false

hatpro_source_sync_enabled: true
hatpro_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
hatpro_source_auth: "{{ edge_source_sync_auth }}"
hatpro_source_user: aurora
hatpro_source_host: "{{ edge_source_sync_ass_host }}"
hatpro_source_port: "{{ edge_source_sync_ass_port }}"
hatpro_source_ssh_key_path: "{{ edge_source_sync_ssh_key_path }}"
hatpro_source_path: /home/aurora/data/hatprog5
hatpro_source_pattern: "HATPROG5-AURORA-ICELAND_*"
hatpro_source_destination: "{{ aurora_paths.raw_hatpro }}"
hatpro_source_state_file: "{{ aurora_state_root }}/hatpro-sync.last"
hatpro_source_sync_interval: 2min
hatpro_source_sync_randomized_delay: 30
# False means the first timer run pulls all existing matching HATPRO files.
hatpro_source_start_fresh: false

vaisalamet_source_sync_enabled: true
vaisalamet_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
vaisalamet_source_auth: "{{ edge_source_sync_auth }}"
vaisalamet_source_user: aurora
vaisalamet_source_host: "{{ edge_source_sync_ass_host }}"
vaisalamet_source_port: "{{ edge_source_sync_ass_port }}"
vaisalamet_source_ssh_key_path: "{{ edge_source_sync_ssh_key_path }}"
vaisalamet_source_path: /home/aurora/data/vaisalamet
vaisalamet_source_pattern: "vaisala_met_level0_*.dat"
vaisalamet_source_destination: "{{ aurora_paths.raw_vaisalamet }}"
vaisalamet_source_state_file: "{{ aurora_state_root }}/vaisalamet-sync.last"
vaisalamet_source_sync_interval: 2min
vaisalamet_source_sync_randomized_delay: 30
# False means the first timer run pulls all existing data files.
vaisalamet_source_start_fresh: false

asfs_logger_source_sync_enabled: true
asfs_logger_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
asfs_logger_source_auth: "{{ edge_source_sync_auth }}"
asfs_logger_source_user: aurora
asfs_logger_source_host: "{{ edge_source_sync_ass_host }}"
asfs_logger_source_port: "{{ edge_source_sync_ass_port }}"
asfs_logger_source_ssh_key_path: "{{ edge_source_sync_ssh_key_path }}"
asfs_logger_source_path: /home/aurora/data/asfs/raw/crd
asfs_logger_source_pattern: "aurora_asfs_data_sci_[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].dat"
asfs_logger_source_destination: "{{ aurora_paths.raw_asfs_crd }}"
asfs_crd_min_stamp: "202605020000"
asfs_logger_source_state_file: "{{ aurora_state_root }}/asfs-logger-sync.last"
asfs_logger_source_sync_interval: 2min
asfs_logger_source_sync_randomized_delay: 30
asfs_logger_source_lookback_days: 10
# False means the first timer run pulls all existing matching source files.
asfs_logger_source_start_fresh: false

