  raw_menapia: "{{ aurora_raw_root }}/menapia"
  raw_wxcam: "{{ aurora_raw_root }}/wxcam"
  raw_auroracam: "{{ aurora_raw_root }}/auroracam"
  raw_ops_monitor: "{{ aurora_raw_root }}/ops_monitor"
  products_cl61: "{{ aurora_product_root }}/cl61"
  products_radar: "{{ aurora_product_root }}/rpgfmcw94"
  products_hatpro: "{{ aurora_product_root }}/hatprog5"
  products_vaisalamet: "{{ aurora_product_root }}/vaisalamet"
  products_asfs_logger: "{{ aurora_product_root }}/asfs_logger"
  products_asfs_fast_sonic: "{{ aurora_product_root }}/asfs_fast_sonic"
  products_asfs_fast_gas: "{{ aurora_product_root }}/asfs_fast_gas"
  products_power: "{{ aurora_product_root }}/power"
  products_power_ecmwf_solar_forecast: "{{ aurora_product_root }}/power/ecmwf_solar_forecast"
  products_power_ecmwf_solar_ensemble: "{{ aurora_product_root }}/power/ecmwf_solar_ensemble"
  products_ops_monitor: "{{ aurora_product_root }}/ops_monitor"
  products_ops_monitor_health: "{{ aurora_product_root }}/ops_monitor/health"
  products_wxcam: "{{ aurora_product_root }}/wxcam"
  products_wxcam_daily_videos: "{{ aurora_product_root }}/wxcam/daily_videos"
  products_auroracam: "{{ aurora_product_root }}/auroracam"
  quicklooks: "{{ aurora_product_root }}/quicklooks"

wxcam_zarr_start_time: "2026-07-04T00:00:00Z"
wxcam_zarr_gws_path: "{{ gws_path }}/data/output/aurora-cloud/products/wxcam/wxcam.zarr"
wxcam_zarr_mount_path: "{{ aurora_product_root }}/wxcam/wxcam.zarr"

aurora_zarr:
  ceilometer: "{{ aurora_product_root }}/cl61/gamb2le_depolarisation_lidar_ceilometer_aurora.zarr"
  cloud_radar: "{{ aurora_product_root }}/rpgfmcw94/cloud_radar.zarr"
  hatpro: "{{ aurora_product_root }}/hatprog5/hatpro.zarr"
  vaisalamet: "{{ aurora_product_root }}/vaisalamet/vaisalamet.zarr"
