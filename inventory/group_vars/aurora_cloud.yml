wxcam_source_sync_enabled: true
wxcam_source_sync_timer_enabled: "{{ aurora_writer_timers_enabled }}"
wxcam_source_user: aurora
wxcam_source_host: 100.124.55.22
wxcam_source_path: /home/aurora/data/wxcam
# The deployed raw sync retains only HDR JPG and MP4 assets for the FISH and
# PANO camera streams. AUTO/LONG/SHORT files remain on the camera host.
wxcam_source_fish_pattern: "HDR_*.jpg"
wxcam_source_pano_pattern: "HDR_*_PANO.jpg"
wxcam_source_destination: "{{ aurora_paths.raw_wxcam }}"
wxcam_source_state_file: "{{ aurora_state_root }}/wxcam-sync.last"
