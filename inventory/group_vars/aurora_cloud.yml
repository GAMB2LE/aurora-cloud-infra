---
aurora_domain: data.gamb2le.co.uk
aurora_public_ip: 130.246.212.116

aurora_service_user: aurora
aurora_service_group: aurora
aurora_app_dir: /opt/aurora-cloud-dashboard
aurora_app_repo: https://github.com/GAMB2LE/aurora_cloud_dashboard.git
aurora_app_version: main
aurora_python: /usr/bin/python3
aurora_venv: "{{ aurora_app_dir }}/venv"
aurora_uv_bin: /usr/local/bin/uv
aurora_uv_cache_dir: "{{ aurora_data_root }}/uv-cache"
aurora_panel_host: 127.0.0.1
aurora_panel_port: 5006

# JASMIN target already has /data on a 999G volume and /project on a 4T Ceph mount.
aurora_data_root: /data/aurora
aurora_product_root: "{{ aurora_data_root }}/products"
aurora_raw_root: /project/aurora/raw
aurora_log_root: /var/log/aurora-cloud
aurora_state_root: /var/lib/aurora-cloud

aurora_paths:
  raw_cl61: "{{ aurora_raw_root }}/cl61"
  raw_radar: "{{ aurora_raw_root }}/rpgfmcw94"
  raw_hatpro: "{{ aurora_raw_root }}/hatprog5"
  raw_vaisalamet: "{{ aurora_raw_root }}/vaisalamet"
  raw_asfs_logger: "{{ aurora_raw_root }}/asfs/loggernet"
  products_cl61: "{{ aurora_product_root }}/cl61"
  products_radar: "{{ aurora_product_root }}/rpgfmcw94"
  products_hatpro: "{{ aurora_product_root }}/hatprog5"
  products_vaisalamet: "{{ aurora_product_root }}/vaisalamet"
  products_asfs_logger: "{{ aurora_product_root }}/asfs_logger"
  products_asfs_fast_sonic: "{{ aurora_product_root }}/asfs_fast_sonic"
  quicklooks: "{{ aurora_product_root }}/quicklooks"

aurora_zarr:
  ceilometer: "{{ aurora_product_root }}/cl61/gamb2le_depolarisation_lidar_ceilometer_aurora.zarr"
  cloud_radar: "{{ aurora_product_root }}/rpgfmcw94/cloud_radar.zarr"
  hatpro: "{{ aurora_product_root }}/hatprog5/hatpro.zarr"
  vaisalamet: "{{ aurora_product_root }}/vaisalamet/vaisalamet.zarr"
  asfs_logger: "{{ aurora_product_root }}/asfs_logger/asfs_logger.zarr"
  asfs_fast_sonic: "{{ aurora_product_root }}/asfs_fast_sonic/asfs_fast_sonic.zarr"

aurora_quicklook_dirs:
  ceilometer: "{{ aurora_paths.quicklooks }}/ceilometer"
  cloud_radar: "{{ aurora_paths.quicklooks }}/cloud_radar"
  hatpro: "{{ aurora_paths.quicklooks }}/hatpro"
  vaisalamet: "{{ aurora_paths.quicklooks }}/vaisalamet"
  asfs_logger: "{{ aurora_paths.quicklooks }}/asfs_logger"

aurora_quicklook_latest:
  ceilometer: "{{ aurora_quicklook_dirs.ceilometer }}/latest.png"
  cloud_radar: "{{ aurora_quicklook_dirs.cloud_radar }}/latest.png"
  hatpro: "{{ aurora_quicklook_dirs.hatpro }}/latest.png"
  vaisalamet: "{{ aurora_quicklook_dirs.vaisalamet }}/latest.png"
  asfs_logger: "{{ aurora_quicklook_dirs.asfs_logger }}/latest.png"

aurora_dashboard_allowed_origins:
  - "{{ aurora_domain }}"
  - "{{ aurora_domain }}:443"

# Backward-compatible global default for any timer not listed below.
aurora_enable_processing_timers: false
aurora_processing_timers:
  # CL61 is the first fresh pipeline to enable. The append script now
  # bootstraps the Zarr from recent raw files when the store is absent.
  ceilometer_append: true
  ceilometer_last24h: true
  ceilometer_quicklooks: true
  radar_append: true
  radar_quicklooks: true
  hatpro_append: false
  vaisalamet_append: true
  vaisalamet_quicklooks: true
  asfs_logger_append: true
  asfs_logger_quicklooks: true
  asfs_fast_sonic_append: true

cl61_source_sync_enabled: true
cl61_source_sync_timer_enabled: true
cl61_source_generate_ssh_key: true
cl61_source_user: aurora
cl61_source_host: 100.117.101.84
cl61_source_path: /home/aurora/data/cl61
cl61_source_pattern: "gamb2le_depolarisation_lidar_ceilometer_aurora_*.nc"
cl61_source_destination: "{{ aurora_paths.raw_cl61 }}"
cl61_source_ssh_key_path: /home/aurora/.ssh/id_ed25519_celine
cl61_source_state_file: "{{ aurora_state_root }}/cl61-sync.last"
cl61_source_sync_interval: 2min
cl61_source_sync_randomized_delay: 30
# True means the first timer run records "now" and does not pull historical data.
cl61_source_start_fresh: true

radar_source_sync_enabled: true
radar_source_sync_timer_enabled: true
radar_source_user: aurora
radar_source_host: 100.124.55.22
radar_source_path: /home/aurora/data/rpgfmcw94
radar_source_pattern: "*LV1.NC"
radar_source_destination: "{{ aurora_paths.raw_radar }}"
radar_source_state_file: "{{ aurora_state_root }}/radar-sync.last"
radar_source_sync_interval: 2min
radar_source_sync_randomized_delay: 30
# True means the first timer run records "now" and does not pull historical data.
radar_source_start_fresh: true

vaisalamet_source_sync_enabled: true
vaisalamet_source_sync_timer_enabled: true
vaisalamet_source_user: aurora
vaisalamet_source_host: 100.124.55.22
vaisalamet_source_path: /home/aurora/data/vaisalamet
vaisalamet_source_pattern: "vaisala_met_level0_*.dat"
vaisalamet_source_destination: "{{ aurora_paths.raw_vaisalamet }}"
vaisalamet_source_state_file: "{{ aurora_state_root }}/vaisalamet-sync.last"
vaisalamet_source_sync_interval: 2min
vaisalamet_source_sync_randomized_delay: 30
# False means the first timer run pulls all existing data files.
vaisalamet_source_start_fresh: false

asfs_logger_source_sync_enabled: true
asfs_logger_source_sync_timer_enabled: true
asfs_logger_source_user: aurora
asfs_logger_source_host: 100.124.55.22
asfs_logger_source_path: /home/aurora/data/asfs/raw/loggernet
asfs_logger_source_pattern: "asfs-logger_sci_[0-9][0-9]_[0-9][0-9]_[0-9][0-9][0-9][0-9].dat"
asfs_logger_source_destination: "{{ aurora_paths.raw_asfs_logger }}"
asfs_logger_source_state_file: "{{ aurora_state_root }}/asfs-logger-sync.last"
asfs_logger_source_sync_interval: 2min
asfs_logger_source_sync_randomized_delay: 30
# False means the first timer run pulls all existing matching source files.
asfs_logger_source_start_fresh: false

asfs_fast_sonic_source_sync_enabled: true
asfs_fast_sonic_source_sync_timer_enabled: true
asfs_fast_sonic_source_user: aurora
asfs_fast_sonic_source_host: 100.124.55.22
asfs_fast_sonic_source_path: /home/aurora/data/asfs/raw/loggernet
asfs_fast_sonic_source_pattern: "asfs-logger_fast_sonic_[0-9][0-9]_[0-9][0-9]_[0-9][0-9][0-9][0-9].dat"
asfs_fast_sonic_source_destination: "{{ aurora_paths.raw_asfs_logger }}"
asfs_fast_sonic_source_state_file: "{{ aurora_state_root }}/asfs-fast-sonic-sync.last"
asfs_fast_sonic_source_sync_interval: 2min
asfs_fast_sonic_source_sync_randomized_delay: 30
# False means the first timer run pulls all existing matching source files.
asfs_fast_sonic_source_start_fresh: false

aurora_enable_ufw: true
aurora_preserve_existing_listener_ports:
  # Existing target services the user asked to leave in place.
  - { port: "5901", proto: tcp, comment: "existing VNC" }
  - { port: "9100", proto: tcp, comment: "existing node_exporter" }
  - { port: "111", proto: tcp, comment: "existing rpcbind" }
  - { port: "111", proto: udp, comment: "existing rpcbind" }

aurora_apt_packages:
  - ca-certificates
  - certbot
  - curl
  - fail2ban
  - fuse3
  - git
  - nginx
  - python3-certbot-nginx
  - python3-venv
  - rsync
  - sshfs
  - ufw
  - unattended-upgrades

aurora_python_requirements:
  - bokeh==3.8.0
  - cftime==1.6.5
  - dask==2025.10.0
  - distributed==2025.10.0
  - h5netcdf==1.7.3
  - h5py==3.15.1
  - holoviews==1.21.0
  - hvplot==0.12.1
  - matplotlib==3.10.7
  - netcdf4==1.7.3
  - numcodecs==0.13.1
  - numpy==2.2.6
  - pandas==2.3.3
  - panel==1.8.2
  - plotly==6.3.1
  - scipy==1.15.3
  - xarray==2025.6.1
  - zarr==2.18.3

tailscale_enabled: true
# Do not commit the auth key. Export TAILSCALE_AUTHKEY before running site.yml,
# or override this variable from an Ansible Vault file.
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') | default('', true) }}"

# Prefer rsync via JASMIN transfer servers for reliable GWS sync.
gws_sync_enabled: false
gws_transfer_host: xfer-vm-01.jasmin.ac.uk
gws_username: rrniii
gws_path: /gws/ssde/j25b/gamb2le
# Automated timers need a real private key on the VM. Agent forwarding from the
# admin SSH session is not sufficient for unattended systemd jobs.
gws_ssh_private_key: /home/aurora/.ssh/id_rsa_jasmin
gws_sync_jobs:
  - name: raw
    source: "{{ aurora_raw_root }}/"
    destination: "{{ gws_path }}/data/incoming/aurora-cloud/raw/"
    schedule: "*:17/30"
  - name: products
    source: "{{ aurora_product_root }}/"
    destination: "{{ gws_path }}/data/output/aurora-cloud/products/"
    schedule: "*:07/30"

# SSHFS mount is optional convenience, not the primary sync path.
gws_sshfs_enabled: false
gws_sshfs_mountpoint: /mnt/gws/gamb2le
