---
# Site role and public endpoint model. Production/JASMIN owns authoritative
# writers; development/data-ocean serves a public live mirror.
aurora_failover_domain: data.gamb2le.co.uk
aurora_standby_domain: data-ocean.gamb2le.co.uk
aurora_domain: "{{ aurora_failover_domain }}"
aurora_public_ip: 130.246.212.116

aurora_site_env: production
aurora_failover_role: primary
aurora_is_primary: "{{ aurora_failover_role | default('primary') == 'primary' }}"
aurora_is_production: "{{ aurora_site_env | default('production') == 'production' }}"
aurora_is_development: "{{ aurora_site_env | default('production') == 'development' }}"
aurora_writer_timers_enabled: "{{ aurora_is_production }}"
aurora_certbot_enabled: "{{ aurora_is_primary }}"

aurora_service_user: aurora
aurora_service_group: aurora
aurora_service_uid: 56781
aurora_service_gid: 56781
aurora_timezone: UTC
aurora_ntp_servers:
  # Keep these DNS-free so hosts with broken resolver state can still sync.
  - 162.159.200.1
  - 162.159.200.123
  - 129.6.15.28
  - 129.6.15.29

