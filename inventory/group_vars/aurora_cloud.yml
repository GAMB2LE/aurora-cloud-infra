auroracam_backfill_scope_file: "{{ aurora_state_root }}/auroracam-backfill.scope"
auroracam_backfill_scope_version: newest-first-v1
auroracam_backfill_interval: 3min
auroracam_backfill_randomized_delay: 45
# Reserve the most recent hour for the priority lane and process older files
# newest-first in bounded, lower-priority batches.
auroracam_backfill_live_guard_seconds: 3600
auroracam_backfill_batch_size: 100
auroracam_backfill_rsync_bwlimit_kib: 256
auroracam_index_interval: 2min
