---
# Site role and public endpoint model. Production/JASMIN owns authoritative
# writers; development/data-ocean serves a public live mirror.
aurora_failover_domain: data.gamb2le.co.uk
aurora_standby_domain: data-ocean.gamb2le.co.uk
aurora_domain: "{{ aurora_failover_domain }}"
aurora_public_ip: 130.246.212.116

aurora_site_env: production
aurora_failover_role: primary
aurora_is_primary: "{{ aurora_failover_role | default('primary') == 'primary' }}"
aurora_is_production: "{{ aurora_site_env | default('production') == 'production' }}"
aurora_is_development: "{{ aurora_site_env | default('production') == 'development' }}"
aurora_writer_timers_enabled: "{{ aurora_is_production }}"
aurora_certbot_enabled: "{{ aurora_is_primary }}"

aurora_service_user: aurora
aurora_service_group: aurora
aurora_service_uid: 56781
aurora_service_gid: 56781
aurora_timezone: UTC
aurora_ntp_servers:
  # Keep these DNS-free so hosts with broken resolver state can still sync.
  - 162.159.200.1
  - 162.159.200.123
  - 129.6.15.28
  - 129.6.15.29

# Current ASS/APS edge addressing, checked 2026-07-06 UTC. Keep source-sync
# hosts pointed at these entries instead of repeating literal Tailscale IPs.
aurora_edge_hosts:
  ass:
    proxmox:
      tailscale_ip: 100.123.149.9
      uplink_ip: 192.168.1.219
      lan_bridge_ip: 192.168.1.254
      wan_bridge_ip: 10.0.0.254
    linux:
      tailscale_ip: 100.124.55.22
      lan_ip: 192.168.1.2
      secondary_lan_ip: 192.168.2.1
      wan_ip: 10.0.0.2
      wifi_ip: 192.168.10.2
    windows:
      tailscale_ip: 100.121.25.32
      lan_ip: 192.168.1.3
      wan_ip: 10.0.0.3
    pbs:
      tailscale_ip: 100.104.16.48
      wan_ip: 10.0.0.253
  aps:
    proxmox:
      tailscale_ip: 100.125.60.40
      uplink_ip: 192.168.99.195
      lan_bridge_ip: 192.168.0.254
      wan_bridge_ip: 10.0.0.254
    linux:
      tailscale_ip: 100.81.226.30
      lan_ip: 192.168.0.8
      wan_ip: 10.0.0.8
      wifi_ip: 192.168.10.8
    windows:
      tailscale_ip: 100.92.179.9
      lan_ip: 192.168.0.9
      wan_ip: 10.0.0.3
    pbs:
      tailscale_ip: ""
      wan_ip: 10.0.0.253

aurora_edge_tunnel_endpoints:
  ass:
    host: 127.0.0.1
    port: 2201
  aps:
    host: 127.0.0.1
    port: 2202

edge_source_sync_use_reverse_tunnels: false
edge_source_sync_auth: "{{ 'ssh_key' if (edge_source_sync_use_reverse_tunnels | bool) else 'tailscale' }}"
edge_source_sync_ssh_key_path: /home/aurora/.ssh/id_ed25519_edge_source_sync
edge_source_sync_ssh_private_key_source: ""
edge_source_sync_ssh_private_key_content: ""
edge_source_sync_ass_host: "{{ aurora_edge_tunnel_endpoints.ass.host if (edge_source_sync_use_reverse_tunnels | bool) else aurora_edge_hosts.ass.linux.tailscale_ip }}"
edge_source_sync_ass_port: "{{ aurora_edge_tunnel_endpoints.ass.port if (edge_source_sync_use_reverse_tunnels | bool) else 22 }}"
edge_source_sync_aps_host: "{{ aurora_edge_tunnel_endpoints.aps.host if (edge_source_sync_use_reverse_tunnels | bool) else aurora_edge_hosts.aps.linux.tailscale_ip }}"
edge_source_sync_aps_port: "{{ aurora_edge_tunnel_endpoints.aps.port if (edge_source_sync_use_reverse_tunnels | bool) else 22 }}"
edge_source_sync_known_hosts:
  - host: "{{ aurora_edge_tunnel_endpoints.ass.host }}"
    port: "{{ aurora_edge_tunnel_endpoints.ass.port }}"
  - host: "{{ aurora_edge_tunnel_endpoints.aps.host }}"
    port: "{{ aurora_edge_tunnel_endpoints.aps.port }}"

aurora_app_dir: /opt/aurora-cloud-dashboard
aurora_app_repo: https://github.com/GAMB2LE/aurora_cloud_dashboard.git
# Exact dashboard release containing the fast SOC/mode re-anchor and stale-input
# guards. Host vars repeat this pin so either environment cannot downgrade the
# live checkout during a routine deployment.
aurora_app_version: prod-20260721.4
aurora_infra_repo_dir: /tmp/aurora-cloud-infra-codex
aurora_python: /usr/bin/python3
aurora_venv: "{{ aurora_app_dir }}/venv"
aurora_uv_bin: /usr/local/bin/uv
aurora_uv_cache_dir: "{{ aurora_data_root }}/uv-cache"
aurora_les_root: "{{ aurora_data_root }}/les"
aurora_les_campaign_root: "{{ aurora_les_root }}/campaigns"
aurora_model_evaluation_campaign_root: "{{ aurora_data_root }}/model-evaluation/campaigns/aurora_iceland_model_evaluation_v1"
aurora_les_runtime_root: "{{ aurora_les_root }}/runtimes"
aurora_les_runtime_dir: "{{ aurora_les_runtime_root }}/aurora-les-operational-current"
aurora_les_python: "{{ aurora_data_root }}/les/runtimes/cloudnetpy-model-eval/bin/python3"
aurora_les_campaign_config: configs/campaigns/aurora_leeds_operational_20260521_rolling.yaml
aurora_les_target: latest-ready
aurora_les_skip_completed: true
aurora_les_era5_lag_days: 5
aurora_les_run_timeout_seconds: 86400
aurora_panel_host: 127.0.0.1
aurora_panel_port: 5006
# Production has 16 CPUs and currently runs the dashboard as a single Panel
# process. Keep development lean while allowing production requests to avoid
# queueing behind a long interactive render.
aurora_dashboard_num_procs: "{{ 2 if aurora_is_production else 1 }}"
aurora_mobile_api_host: 127.0.0.1
aurora_mobile_api_port: 8010
aurora_nginx_disabled_sites: []

# JASMIN target already has /data on a 999G volume and /project on a 4T Ceph mount.
aurora_data_root: /data/aurora
aurora_product_root: "{{ aurora_data_root }}/products"
aurora_raw_root: /project/aurora/raw
aurora_dev_product_root: "{{ aurora_data_root }}/dev-products"
aurora_dev_raw_root: /project/aurora/dev-raw
aurora_dev_live_mirror_stamp: "{{ aurora_data_root }}/internal/dev-live-mirror/last_success.json"
aurora_dev_live_mirror_recent_minutes: 7.5
aurora_ecmwf_provider: legacy
aurora_ecmwf_shadow_enabled: "{{ aurora_is_development }}"
aurora_ecmwf_shadow_report_path: >-
  {{ (aurora_dev_product_root ~ '/power/ecmwf_provider_shadow.json')
     if aurora_is_development
     else (aurora_product_root ~ '/power/ecmwf_provider_shadow.json') }}
aurora_ecmwf_shadow_history_path: >-
  {{ (aurora_dev_product_root ~ '/power/ecmwf_provider_shadow_history.jsonl')
     if aurora_is_development
     else (aurora_product_root ~ '/power/ecmwf_provider_shadow_history.jsonl') }}
aurora_ecmwf_shadow_gate_path: >-
  {{ (aurora_dev_product_root ~ '/power/ecmwf_provider_promotion_gate.json')
     if aurora_is_development
     else (aurora_product_root ~ '/power/ecmwf_provider_promotion_gate.json') }}
aurora_dashboard_probe_enabled: "{{ aurora_is_development }}"
aurora_dashboard_probe_root: "{{ aurora_data_root }}/internal/dashboard-probe"
aurora_dashboard_probe_warn_seconds: 4.0
aurora_dashboard_probe_compare_delta_seconds: 2.0
# Operating scenarios are a published dashboard product in both environments.
# Production generates the authoritative product; development generates its
# independent staging product under /data/aurora/dev-products.
aurora_power_operating_enabled: true
aurora_power_operating_root: >-
  {{ (aurora_dev_product_root ~ '/power')
     if aurora_is_development
     else (aurora_product_root ~ '/power') }}
aurora_power_planning_forecast_path: "{{ aurora_power_operating_root }}/power_soc_planning_forecast.zarr"
aurora_power_planning_forecast_cache: "{{ aurora_power_operating_root }}/ecmwf_solar_planning"
aurora_power_planning_forecast_state: "{{ aurora_power_operating_root }}/power_soc_planning_state.json"
aurora_power_planning_forecast_archive: "{{ aurora_power_operating_root }}/power_soc_planning_archive.zarr"
aurora_power_planning_forecast_skill: "{{ aurora_power_operating_root }}/power_soc_planning_skill.zarr"
aurora_power_planning_hindcast: "{{ aurora_power_operating_root }}/power_soc_planning_hindcast.zarr"
aurora_power_operating_state_path: "{{ aurora_power_operating_root }}/power_operating_state.zarr"
aurora_power_operating_scenarios_path: "{{ aurora_power_operating_root }}/power_operating_scenarios.zarr"
aurora_power_operating_model_state_path: "{{ aurora_power_operating_root }}/power_operating_model_state.json"
aurora_power_operating_recommendations_path: "{{ aurora_power_operating_root }}/power_operating_recommendations.json"
aurora_power_display_summary_path: "{{ aurora_product_root }}/power/power_display_summary.zarr"
aurora_power_display_energy_path: "{{ aurora_product_root }}/power/power_display_energy.zarr"
aurora_log_root: /var/log/aurora-cloud
aurora_state_root: /var/lib/aurora-cloud

aurora_paths:
  raw_cl61: "{{ aurora_raw_root }}/cl61"
  raw_radar: "{{ aurora_raw_root }}/rpgfmcw94"
  raw_hatpro: "{{ aurora_raw_root }}/hatprog5"
  raw_vaisalamet: "{{ aurora_raw_root }}/vaisalamet"
  raw_asfs: "{{ aurora_raw_root }}/asfs"
