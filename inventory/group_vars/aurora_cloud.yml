---
# aurora_domain is the hostname this host actively serves. Standby hosts can
# override it while aurora_failover_domain remains the promoted main site.
aurora_failover_domain: data.gamb2le.co.uk
aurora_standby_domain: data-ocean.gamb2le.co.uk
aurora_domain: "{{ aurora_failover_domain }}"
aurora_public_ip: 130.246.212.116

aurora_failover_role: primary
aurora_is_primary: "{{ aurora_failover_role | default('primary') == 'primary' }}"
aurora_writer_timers_enabled: "{{ aurora_is_primary }}"
aurora_certbot_enabled: "{{ aurora_is_primary }}"

aurora_service_user: aurora
aurora_service_group: aurora
aurora_app_dir: /opt/aurora-cloud-dashboard
aurora_app_repo: git@github-dashboard:GAMB2LE/aurora_cloud_dashboard.git
aurora_app_version: 3295de15366480b7e14a5cad3cd30ac7c4bf66d2
aurora_dashboard_extra_files:
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/app.py"
    dest: app.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/collect_operations_snapshot.py"
    dest: collect_operations_snapshot.py
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/model-evaluation.py"
    dest: model-evaluation.py
    owner: root
    group: root
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/dart.py"
    dest: dart.py
    owner: root
    group: root
    mode: "0644"
  - src: "{{ inventory_dir }}/../../aurora_cloud_dashboard/wxcam_catalog.py"
    dest: wxcam_catalog.py
    mode: "0644"
aurora_dashboard_default_instrument: Ceilometer
aurora_infra_repo_dir: /tmp/aurora-cloud-infra-codex
aurora_python: /usr/bin/python3
aurora_venv: "{{ aurora_app_dir }}/venv"
aurora_uv_bin: /usr/local/bin/uv
aurora_uv_cache_dir: "{{ aurora_data_root }}/uv-cache"
aurora_les_root: "{{ aurora_data_root }}/les"
aurora_les_campaign_root: "{{ aurora_les_root }}/campaigns"
aurora_les_runtime_root: "{{ aurora_les_root }}/runtimes"
aurora_les_runtime_dir: "{{ aurora_les_runtime_root }}/aurora-les-operational-current"
aurora_les_python: "{{ aurora_data_root }}/les/runtimes/cloudnetpy-model-eval/bin/python3"
aurora_les_campaign_config: configs/campaigns/aurora_leeds_operational_20260521_rolling.yaml
aurora_les_target: latest-ready
aurora_les_skip_completed: true
aurora_les_era5_lag_days: 5
aurora_les_run_timeout_seconds: 86400
aurora_panel_host: 127.0.0.1
aurora_panel_port: 5006
aurora_nginx_disabled_sites: []

# JASMIN target already has /data on a 999G volume and /project on a 4T Ceph mount.
aurora_data_root: /data/aurora
aurora_product_root: "{{ aurora_data_root }}/products"
aurora_raw_root: /project/aurora/raw
aurora_log_root: /var/log/aurora-cloud
aurora_state_root: /var/lib/aurora-cloud

aurora_paths:
  raw_cl61: "{{ aurora_raw_root }}/cl61"
  raw_radar: "{{ aurora_raw_root }}/rpgfmcw94"
  raw_hatpro: "{{ aurora_raw_root }}/hatprog5"
  raw_vaisalamet: "{{ aurora_raw_root }}/vaisalamet"
