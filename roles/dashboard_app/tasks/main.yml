---
- name: Ensure application directory exists
  ansible.builtin.file:
    path: "{{ aurora_app_dir }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
    mode: "0755"

- name: Inspect existing dashboard checkout
  ansible.builtin.stat:
    path: "{{ aurora_app_dir }}/.git"
  register: aurora_dashboard_git_dir

- name: Check existing dashboard checkout is clean
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ aurora_app_dir }}"
      - status
      - --porcelain
      - --untracked-files=all
  become_user: "{{ aurora_service_user }}"
  register: aurora_dashboard_git_status
  changed_when: false
  check_mode: false
  when: aurora_dashboard_git_dir.stat.exists

- name: Refuse to overwrite an unpreserved dashboard checkout
  ansible.builtin.assert:
    that:
      - aurora_dashboard_git_status.stdout | trim == ''
    fail_msg: >-
      {{ aurora_app_dir }} has tracked or untracked changes. Preserve them as a
      patch/tag and clean the checkout before deploying {{ aurora_app_version }}.
  when: aurora_dashboard_git_dir.stat.exists

- name: Check out dashboard application
  ansible.builtin.git:
    repo: "{{ aurora_app_repo }}"
    dest: "{{ aurora_app_dir }}"
    version: "{{ aurora_app_version }}"
    update: true
    force: false
  become_user: "{{ aurora_service_user }}"
  when: not ansible_check_mode

- name: Ensure app directory ownership
  ansible.builtin.file:
    path: "{{ aurora_app_dir }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
  when: not ansible_check_mode

- name: Ensure uv cache directory exists
  ansible.builtin.file:
    path: "{{ aurora_uv_cache_dir }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
    mode: "0755"
    recurse: true
  when: not ansible_check_mode

- name: Create Python virtual environment with uv
  ansible.builtin.command: "{{ aurora_uv_bin }} venv {{ aurora_venv }} --python {{ aurora_python }}"
  args:
    creates: "{{ aurora_venv }}/bin/python"
  environment:
    UV_CACHE_DIR: "{{ aurora_uv_cache_dir }}"
  become_user: "{{ aurora_service_user }}"
  when: not ansible_check_mode

- name: Install Python dependencies with uv
  ansible.builtin.command: "{{ aurora_uv_bin }} pip install --upgrade -r {{ aurora_app_dir }}/requirements-dashboard.txt --python {{ aurora_venv }}/bin/python"
  environment:
    UV_CACHE_DIR: "{{ aurora_uv_cache_dir }}"
  become_user: "{{ aurora_service_user }}"
  when: not ansible_check_mode
  notify: Restart dashboard
