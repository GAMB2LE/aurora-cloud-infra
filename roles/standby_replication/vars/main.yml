---
# Raw instruments are independent synchronization domains. Keeping them
# separate prevents a large camera archive scan from delaying every other
# dashboard product.
aurora_standby_raw_stages:
  - name: raw-asfs
    source: /project/aurora/raw/asfs/
    destination: /project/aurora/raw/asfs/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-auroracam
    source: /project/aurora/raw/auroracam/
    destination: /project/aurora/raw/auroracam/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-cl61
    source: /project/aurora/raw/cl61/
    destination: /project/aurora/raw/cl61/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-hatprog5
    source: /project/aurora/raw/hatprog5/
    destination: /project/aurora/raw/hatprog5/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-menapia
    source: /project/aurora/raw/menapia/
    destination: /project/aurora/raw/menapia/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-ops-monitor
    source: /project/aurora/raw/ops_monitor/
    destination: /project/aurora/raw/ops_monitor/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-pdu
    source: /project/aurora/raw/pdu/
    destination: /project/aurora/raw/pdu/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-power
    source: /project/aurora/raw/power/
    destination: /project/aurora/raw/power/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-rpgfmcw94
    source: /project/aurora/raw/rpgfmcw94/
    destination: /project/aurora/raw/rpgfmcw94/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-vaisalamet
    source: /project/aurora/raw/vaisalamet/
    destination: /project/aurora/raw/vaisalamet/
    exclude: ["*.lock", "*.tmp"]
  - name: raw-wxcam
    source: /project/aurora/raw/wxcam/
    destination: /project/aurora/raw/wxcam/
    exclude: ["*.lock", "*.tmp"]

aurora_standby_product_stages:
  - name: product-asfs-fast-gas
    source: /data/aurora/products/asfs_fast_gas/
    destination: /data/aurora/products/asfs_fast_gas/
    exclude: ["*.lock", "*.tmp"]
  - name: product-asfs-fast-sonic
    source: /data/aurora/products/asfs_fast_sonic/
    destination: /data/aurora/products/asfs_fast_sonic/
    exclude: ["*.lock", "*.tmp"]
  - name: product-asfs-logger
    source: /data/aurora/products/asfs_logger/
    destination: /data/aurora/products/asfs_logger/
    exclude: ["*.lock", "*.tmp"]
  - name: product-auroracam
    source: /data/aurora/products/auroracam/
    destination: /data/aurora/products/auroracam/
    exclude: ["*.lock", "*.tmp"]
  - name: product-cl61
    source: /data/aurora/products/cl61/
    destination: /data/aurora/products/cl61/
    exclude: ["*.lock", "*.tmp"]
  - name: product-cloudnet
    source: /data/aurora/products/cloudnet/
    destination: /data/aurora/products/cloudnet/
    exclude: ["*.lock", "*.tmp"]
  - name: product-dashboard
    source: /data/aurora/products/dashboard/
    destination: /data/aurora/products/dashboard/
    exclude: ["*.lock", "*.tmp"]
  - name: product-hatprog5
    source: /data/aurora/products/hatprog5/
    destination: /data/aurora/products/hatprog5/
    exclude: ["*.lock", "*.tmp"]
  - name: product-ops-monitor
    source: /data/aurora/products/ops_monitor/
    destination: /data/aurora/products/ops_monitor/
    exclude: ["*.lock", "*.tmp"]
  - name: product-power
    source: /data/aurora/products/power/
    destination: /data/aurora/products/power/
    exclude: ["*.lock", "*.tmp"]
  - name: product-quicklooks
    source: /data/aurora/products/quicklooks/
    destination: /data/aurora/products/quicklooks/
    exclude: ["*.lock", "*.tmp"]
  - name: product-rpgfmcw94
    source: /data/aurora/products/rpgfmcw94/
    destination: /data/aurora/products/rpgfmcw94/
    exclude: ["*.lock", "*.tmp"]
  - name: product-vaisalamet
    source: /data/aurora/products/vaisalamet/
    destination: /data/aurora/products/vaisalamet/
    exclude: ["*.lock", "*.tmp"]
  - name: product-wxcam
    source: /data/aurora/products/wxcam/
    destination: /data/aurora/products/wxcam/
    exclude: [".zarr-rebuild-backups/**", "*.lock", "*.tmp"]
