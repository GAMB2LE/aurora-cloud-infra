---
- name: Download official uv installer
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: "0755"

- name: Install uv system binary
  ansible.builtin.command: /tmp/uv-install.sh --no-modify-path
  args:
    creates: "{{ aurora_uv_bin }}"
  environment:
    UV_INSTALL_DIR: /usr/local/bin
    UV_NO_MODIFY_PATH: "1"

- name: Verify uv is available
  ansible.builtin.command: "{{ aurora_uv_bin }} --version"
  changed_when: false
