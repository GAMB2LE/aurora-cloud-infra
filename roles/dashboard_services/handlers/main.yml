---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart dashboard
  ansible.builtin.systemd:
    name: aurora-dashboard.service
    state: restarted
  when:
    - not ansible_check_mode
    - ansible_facts.service_mgr == "systemd"
