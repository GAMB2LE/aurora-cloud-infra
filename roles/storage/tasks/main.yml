---
- name: Ensure raw data directories exist under /project
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
    mode: "02775"
  loop:
    - "{{ aurora_paths.raw_cl61 }}"
    - "{{ aurora_paths.raw_radar }}"
    - "{{ aurora_paths.raw_hatpro }}"
    - "{{ aurora_paths.raw_vaisalamet }}"
    - "{{ aurora_paths.raw_asfs }}"
    - "{{ aurora_paths.raw_asfs_logger }}"
    - "{{ aurora_paths.raw_asfs_crd }}"
    - "{{ aurora_paths.raw_power }}"
    - "{{ aurora_paths.raw_pdu }}"
    - "{{ aurora_paths.raw_menapia }}"
    - "{{ aurora_paths.raw_ops_monitor }}"
    - "{{ aurora_paths.raw_wxcam }}"
    - "{{ aurora_paths.raw_auroracam }}"
    - "{{ aurora_dev_raw_root }}"

- name: Ensure dashboard product directories exist under /data
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
    mode: "02775"
  loop:
    - "{{ aurora_product_root }}"
    - "{{ aurora_dev_product_root }}"
    - "{{ aurora_paths.products_cl61 }}"
    - "{{ aurora_paths.products_radar }}"
    - "{{ aurora_paths.products_hatpro }}"
    - "{{ aurora_paths.products_vaisalamet }}"
    - "{{ aurora_paths.products_asfs_logger }}"
    - "{{ aurora_paths.products_asfs_fast_sonic }}"
    - "{{ aurora_paths.products_asfs_fast_gas }}"
    - "{{ aurora_paths.products_power }}"
    - "{{ aurora_paths.products_ops_monitor }}"
    - "{{ aurora_paths.products_wxcam }}"
    - "{{ aurora_paths.products_auroracam }}"
    - "{{ aurora_paths.quicklooks }}"
    - "{{ aurora_quicklook_dirs.ceilometer }}"
    - "{{ aurora_quicklook_dirs.cloud_radar }}"
    - "{{ aurora_quicklook_dirs.hatpro }}"
    - "{{ aurora_quicklook_dirs.vaisalamet }}"
    - "{{ aurora_quicklook_dirs.asfs_logger }}"
    - "{{ aurora_quicklook_dirs.asfs_fast_sonic }}"
    - "{{ aurora_quicklook_dirs.power }}"
    - "{{ aurora_quicklook_dirs.ops_monitor }}"
    - "{{ aurora_log_root }}"
    - "{{ aurora_state_root }}"
    - "{{ aurora_les_root }}"
    - "{{ aurora_les_campaign_root }}"
    - "{{ aurora_les_runtime_root }}"

- name: Ensure LES campaign outputs remain writable by the service user
  ansible.builtin.file:
    path: "{{ aurora_les_campaign_root }}"
    state: directory
    owner: "{{ aurora_service_user }}"
    group: "{{ aurora_service_group }}"
    mode: "02775"
    recurse: true
