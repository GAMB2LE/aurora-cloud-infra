---
- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Explicitly deny direct public Panel port
  community.general.ufw:
    rule: deny
    port: "{{ aurora_panel_port }}"
    proto: tcp

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Ensure fail2ban is enabled
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
