---
- name: Ensure UFW log file exists for rsyslog omfile
  ansible.builtin.file:
    path: /var/log/ufw.log
    state: touch
    owner: syslog
    group: adm
    mode: "0640"
  when: aurora_enable_ufw | bool
  notify: Restart rsyslog

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: aurora_enable_ufw | bool

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: aurora_enable_ufw | bool

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: aurora_enable_ufw | bool

- name: Preserve existing listener ports requested by user
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ aurora_preserve_existing_listener_ports }}"
  when: aurora_enable_ufw | bool

- name: Remove stale public listener port allows
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    delete: true
  loop: "{{ aurora_remove_public_listener_ports | default([]) }}"
  when: aurora_enable_ufw | bool

- name: Explicitly deny direct public Panel port
  community.general.ufw:
    rule: deny
    port: "{{ aurora_panel_port }}"
    proto: tcp
  when: aurora_enable_ufw | bool

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: aurora_enable_ufw | bool

- name: Ensure fail2ban is enabled
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: not ansible_check_mode
